[package]
name = "fmod-rs"
version = "0.0.0"
edition = "2021"

publish = false

[lib]
name = "fmod"

[features]
default = ["raw"]

raw = []
studio = ["dep:fmod-studio-sys"]
tracing = ["dep:tracing"]

[dependencies]
fmod-core-sys = { version = "0.0.0", path = "../fmod-core-sys" }
fmod-studio-sys = { version = "0.0.0", path = "../fmod-studio-sys", optional = true }
once_cell = "1.10.0"
parking_lot = "0.12.0"
static_assertions = "1.1.0"
tracing = { version = "0.1.32", optional = true }
